<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleet — Hello World</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0b0d12;
      --fg: #f5f7fa;
      --muted: #9aa4b2;
      --accent: #6d8bff;
      --accent-2: #c08bff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--fg);
      display: grid;
      place-items: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .glow {
      position: absolute;
      width: 60vmax;
      height: 60vmax;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      z-index: 0;
      animation: float 14s ease-in-out infinite;
    }
    .glow.one { background: var(--accent); top: -20vmax; left: -10vmax; }
    .glow.two { background: var(--accent-2); bottom: -20vmax; right: -10vmax; animation-delay: -7s; }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(4vmax, 3vmax) scale(1.1); }
    }

    .card {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 3rem 2rem;
      max-width: 640px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-bottom: 1.75rem;
      backdrop-filter: blur(8px);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3ddc97;
      box-shadow: 0 0 12px #3ddc97;
    }

    h1 {
      font-size: clamp(2.75rem, 8vw, 5rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.05;
      background: linear-gradient(135deg, #ffffff 0%, var(--accent) 55%, var(--accent-2) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }

    p.lead {
      color: var(--muted);
      font-size: clamp(1rem, 2.5vw, 1.2rem);
      line-height: 1.6;
      max-width: 32rem;
      margin: 0 auto 2rem;
    }

    code {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      color: var(--fg);
      background: rgba(255, 255, 255, 0.08);
      padding: 0.15rem 0.45rem;
      border-radius: 6px;
      font-size: 0.95em;
    }

    .footer {
      position: absolute;
      bottom: 1.5rem;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      z-index: 1;
    }
  </style>
</head>
<body>
  <div class="glow one"></div>
  <div class="glow two"></div>

  <main class="card">
    <span class="pill"><span class="dot"></span> Deployed on Vercel</span>
    <h1>Hello, world.</h1>
    <p class="lead">
      You're looking at <code>fleet.fast</code> — a fresh deployment, live and ready.
      If you can read this, the domain is wired up correctly.
    </p>
  </main>

  <div class="footer">fleet · hello world</div>
</body>
</html>
